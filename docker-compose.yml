version: '3.8'

services:
  backend:
    image: setulalchowhan/halkhata-backend:v1
    build: ./backend
    container_name: halkhata-backend
    command: npm run dev  # Use nodemon for hot-reloading
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules # Anonymous volume to preserve container node_modules
    environment:
      - PORT=5000
      - MONGO_URI=mongodb+srv://setulalchowhan:setu1234@cluster0.15qqqco.mongodb.net/?appName=Halkhata
      - JWT_SECRET=supersecretjwtkey_for_halkhata
      - N8N_WEBHOOK_URL=https://reasonlessly-undelirious-tania.ngrok-free.dev/webhook/halkhata-trigger
      - AUTOMATION_API_KEY=halkhata_automation_2026_xyz
    restart: always

  frontend:
    image: setulalchowhan/halkhata-frontend:v1
    build:
      context: ./frontend
      target: build
      args:
        - VITE_API_BASE_URL=/api
    container_name: halkhata-frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "3000:5173" # Mapping Vite dev server to port 3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=/api
    depends_on:
      - backend
    restart: always
